# comparaU.com — stack de backend para VPS
# Uso: docker compose up -d   (la primera vez Caddy pedirá el certificado TLS)
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks: [comparau]

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w ${API_WORKERS:-3} -b 0.0.0.0:8000
      --access-logfile - --error-logfile -
    networks: [comparau]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [comparau]   # NB: db NO expone puertos a Internet, solo red interna

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks: [comparau]

  # ETL on-demand: docker compose run --rm etl
  etl:
    build: .
    profiles: ["tools"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m etl.ingest --all
    networks: [comparau]

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:

networks:
  comparau:
    driver: bridge
